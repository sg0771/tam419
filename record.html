<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>录制中心</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
    <style>
        :root {
            --primary: #007aff;
            --danger: #d93025;
            --success: #28a745;
            --bg: #f5f7f9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 980px;
        }
        h2 { text-align: center; color: var(--primary); margin: 0 0 16px; }

        .mode-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        select, input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: #fff;
        }

        .preview-wrap {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin: 0 auto 20px;
            aspect-ratio: 16 / 9;
            border: 2px solid #ddd;
            width: 100%;
            max-width: 820px;
            max-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video#preview { width: 100%; height: 100%; object-fit: contain; }

        .rec-status {
            position: absolute;
            top: 15px;
            left: 15px;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
        }
        .dot { width: 10px; height: 10px; background: #ff4d4f; border-radius: 50%; animation: blink 1s infinite; }
        .timer { color: #fff; font-family: monospace; font-size: 15px; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .config-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px; }
        .field.full { grid-column: span 2; }
        .actions { display: flex; gap: 12px; }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        #btn-preview { background: #6c757d; }
        #btn-start { background: var(--danger); }
        #btn-stop { background: var(--success); }

        .tips { margin-top: 10px; font-size: 12px; color: #0050b3; }

        @media (max-width: 900px) {
            .mode-row, .config-grid { grid-template-columns: 1fr 1fr; }
            .field.full { grid-column: span 2; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="mode-row">
        <div class="field">
            <select id="record-mode">
                <option value="screen" selected>屏幕录制</option>
                <option value="camera">摄像头录制</option>
            </select>
        </div>
        <div class="field" id="camera-device-field" style="display:none;">
            <label>摄像头设备</label>
            <select id="cam-dev"><option value="">正在检测设备...</option></select>
        </div>
    </div>

    <div class="preview-wrap">
        <div class="rec-status" id="rec-ui">
            <div class="dot"></div>
            <span class="timer" id="rec-timer">00:00:00</span>
        </div>
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <div class="config-grid">
        <div class="field" id="camera-res-field" style="display:none;">
            <label>采集参数</label>
            <select id="cam-res"><option value="default">请先开启预览</option></select>
            <div id="caps-hint" class="tips">同步硬件能力中...</div>
        </div>

        <div class="field">
            <label>音频来源</label>
            <select id="audio-mode">
                <option value="mix" selected>系统音 + 麦克风</option>
                <option value="sys">仅系统声音</option>
                <option value="mic">仅麦克风</option>
                <option value="none">无声</option>
            </select>
        </div>

        <div class="field">
            <label>编码引擎</label>
            <select id="encode-engine">
                <option value="gpu">GPU 硬件加速</option>
                <option value="cpu">CPU 软件编码</option>
            </select>
        </div>

        <div class="field">
            <label>视频码率 (Mbps)</label>
            <input type="number" id="v-bitrate" value="6.0" step="0.5" min="0.5">
        </div>

        <div class="field">
            <label>存储方式</label>
            <select id="write-mode">
                <option value="disk">直接写硬盘 (防崩)</option>
                <option value="ram">缓存到内存</option>
            </select>
        </div>
    </div>

    <div class="actions">
        <button id="btn-preview" class="btn">1. 选择录制源并预览</button>
        <button id="btn-start" class="btn" disabled>2. 开始录制</button>
        <button id="btn-stop" class="btn" disabled>3. 停止并保存</button>
    </div>

    <div class="tips" id="source-info">💡 屏幕录制请勾选“分享系统音频”；摄像头录制可使用采集参数自动匹配。</div>
</div>

<script type="module">
import { Muxer, ArrayBufferTarget, StreamTarget } from './lib/mp4-muxer.js';
const ffmpegHost = window.parent;
if (!ffmpegHost || ffmpegHost === window || !ffmpegHost.SharedFFmpeg || !ffmpegHost.FFmpeg) {
    document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif">请从 index.html 打开此页面。</div>';
    throw new Error('请从 index.html 进入此页面');
}
const { fetchFile } = ffmpegHost.FFmpeg;
const ffmpeg = ffmpegHost.SharedFFmpeg.getOrCreate(ffmpegHost.__sharedFFmpegConfig);

const el = {
    mode: document.getElementById('record-mode'),
    camField: document.getElementById('camera-device-field'),
    camSelect: document.getElementById('cam-dev'),
    camResField: document.getElementById('camera-res-field'),
    resSelect: document.getElementById('cam-res'),
    capsHint: document.getElementById('caps-hint'),
    preview: document.getElementById('preview'),
    sourceInfo: document.getElementById('source-info'),
    btnPreview: document.getElementById('btn-preview'),
    btnStart: document.getElementById('btn-start'),
    btnStop: document.getElementById('btn-stop'),
    recUI: document.getElementById('rec-ui'),
    recTimer: document.getElementById('rec-timer'),
    bitrateInput: document.getElementById('v-bitrate')
};

let sourceStream = null;
let micStream = null;
let sysAudioStream = null;
let isRecording = false;
let recStartTime = 0;
let timerId = null;
let vEncoder = null, aEncoder = null, muxer = null;
let writableFileStream = null;

(async () => {
    try {
        await ffmpegHost.SharedFFmpeg.load(ffmpegHost.__sharedFFmpegConfig);
        await loadCameraDevices();
    } catch (e) {
        alert('引擎初始化失败: ' + err.message);
    }
})();

async function loadCameraDevices() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    el.camSelect.innerHTML = cams.length ? cams.map(c => `<option value="${c.deviceId}">${c.label || '摄像头'}</option>`).join('') : '<option value="">未检测到摄像头</option>';
}

el.mode.onchange = () => {
    const isCamera = el.mode.value === 'camera';
    el.camField.style.display = isCamera ? '' : 'none';
    el.camResField.style.display = isCamera ? '' : 'none';
    el.sourceInfo.innerText = isCamera
        ? '💡 摄像头模式支持自动探测分辨率/FPS 上限。'
        : '💡 屏幕录制请勾选“分享系统音频”，窗口/标签关闭将自动结束录制。';
    stopAllStreams();
    el.preview.srcObject = null;
    el.btnStart.disabled = true;
};

async function probeCapabilities(track) {
    if (!track?.getCapabilities) {
        el.resSelect.innerHTML = '<option value="1280x720|30">720P / 30FPS</option>';
        return;
    }
    const caps = track.getCapabilities();
    const maxW = caps.width?.max || 1280;
    const maxH = caps.height?.max || 720;
    const maxFPS = Math.floor(caps.frameRate?.max || 30);
    const presets = [
        { w: 3840, h: 2160, label: '4K' },
        { w: 1920, h: 1080, label: '1080P' },
        { w: 1280, h: 720, label: '720P' },
        { w: 640, h: 360, label: '360P' }
    ];
    let html = '';
    presets.forEach(p => {
        if (maxW >= p.w && maxH >= p.h) {
            html += `<option value="${p.w}x${p.h}|30">${p.label} / 30FPS</option>`;
            if (maxFPS >= 60) html += `<option value="${p.w}x${p.h}|60">${p.label} / 60FPS</option>`;
        }
    });
    el.resSelect.innerHTML = html || `<option value="${maxW}x${maxH}|${maxFPS}">${maxW}x${maxH} @ ${maxFPS}FPS</option>`;
    el.capsHint.innerText = `✅ 硬件上限: ${maxW}x${maxH} @ ${maxFPS}FPS`;
}

el.btnPreview.onclick = async () => {
    stopAllStreams();
    el.btnStart.disabled = true;
    try {
        if (el.mode.value === 'screen') {
            sourceStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: true });
            const vTrack = sourceStream.getVideoTracks()[0];
            const s = vTrack.getSettings();
            el.sourceInfo.innerText = `✅ 已连接：${s.width}x${s.height} @ ${Math.floor(s.frameRate || 30)}FPS`;
            vTrack.onended = () => { if (isRecording) el.btnStop.click(); };
        } else {
            sourceStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: el.camSelect.value ? { exact: el.camSelect.value } : undefined },
                audio: true
            });
            await probeCapabilities(sourceStream.getVideoTracks()[0]);
            el.sourceInfo.innerText = '✅ 摄像头预览已开启，可开始录制';
        }
        el.preview.srcObject = sourceStream;
        el.btnStart.disabled = false;
        el.status.innerText = '🎬 信号就绪';
    } catch (err) {
        alert('选择录制源失败: ' + err.message);
    }
};

el.btnStart.onclick = async () => {
    if (!sourceStream) return;
    const mode = el.mode.value;
    const audioMode = document.getElementById('audio-mode').value;
    const writeMode = document.getElementById('write-mode').value;
    const engine = document.getElementById('encode-engine').value;
    const bitrateMbps = parseFloat(el.bitrateInput.value) || 6.0;

    if (writeMode === 'disk') {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: `${mode === 'camera' ? 'Camera' : 'Screen'}_${Date.now()}.mp4`,
                types: [{ description: 'Video', accept: { 'video/mp4': ['.mp4'] } }]
            });
            writableFileStream = await handle.createWritable();
        } catch { return; }
    }

    const finalStream = new MediaStream();
    const videoTrack = sourceStream.getVideoTracks()[0];

    if (mode === 'camera') {
        const [res, fpsStr] = (el.resSelect.value || '1280x720|30').split('|');
        const [w, h] = res.split('x').map(Number);
        const fps = parseInt(fpsStr, 10) || 30;
        try { await videoTrack.applyConstraints({ width: w, height: h, frameRate: fps }); } catch {}
    }
    finalStream.addTrack(videoTrack);

    try {
        if (audioMode !== 'none') {
            const tracks = [];
            if (audioMode === 'sys' || audioMode === 'mix') {
                if (mode === 'screen' && sourceStream.getAudioTracks().length) tracks.push(sourceStream.getAudioTracks()[0]);
                if (mode === 'camera') {
                    sysAudioStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    if (sysAudioStream.getAudioTracks().length) tracks.push(sysAudioStream.getAudioTracks()[0]);
                    sysAudioStream.getVideoTracks().forEach(t => t.stop());
                }
            }
            if (audioMode === 'mic' || audioMode === 'mix') {
                const micTrack = sourceStream.getAudioTracks()[0];
                if (mode === 'camera' && micTrack) tracks.push(micTrack);
                if (mode === 'screen') {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    tracks.push(micStream.getAudioTracks()[0]);
                }
            }
            if (tracks.length > 1) {
                const ctx = new AudioContext();
                const dest = ctx.createMediaStreamDestination();
                tracks.forEach(t => ctx.createMediaStreamSource(new MediaStream([t])).connect(dest));
                finalStream.addTrack(dest.stream.getAudioTracks()[0]);
            } else if (tracks.length === 1) {
                finalStream.addTrack(tracks[0]);
            }
        }

        isRecording = true;
        el.btnStart.disabled = true;
        el.btnStop.disabled = false;
        el.recUI.style.display = 'flex';

        if (engine === 'gpu' && window.VideoEncoder) await startGPURec(finalStream, bitrateMbps);
        else await startCPURec(finalStream, bitrateMbps);

        recStartTime = Date.now();
        timerId = setInterval(() => {
            const s = Math.floor((Date.now() - recStartTime) / 1000);
            el.recTimer.innerText = new Date(s * 1000).toISOString().slice(11, 19);
        }, 1000);
    } catch (err) {
        alert('初始化失败: ' + err.message);
        isRecording = false;
        el.btnStart.disabled = false;
    }
};

async function startGPURec(stream, mbps) {
    const vTrack = stream.getVideoTracks()[0];
    const set = vTrack.getSettings();
    const w = set.width || 1280, h = set.height || 720, fps = Math.floor(set.frameRate || 30);
    const bps = mbps * 1_000_000;

    const profiles = [{ codec: 'avc1.640033' }, { codec: 'avc1.4D4033' }, { codec: 'avc1.42E01F' }];
    let selectedCodec = 'avc1.42E01F';
    for (const p of profiles) {
        const support = await VideoEncoder.isConfigSupported({ codec: p.codec, width: w, height: h, bitrate: bps, framerate: fps });
        if (support.supported) { selectedCodec = p.codec; break; }
    }

    const aTrack = stream.getAudioTracks()[0];
    let aConf = null;
    if (aTrack) {
        const as = aTrack.getSettings();
        aConf = { codec: 'mp4a.40.2', sampleRate: as.sampleRate, numberOfChannels: as.channelCount || 2, bitrate: 128_000 };
    }

    const target = writableFileStream
        ? new StreamTarget({ onData: (data, pos) => writableFileStream.write({ type: 'write', data, position: pos }) })
        : new ArrayBufferTarget();

    muxer = new Muxer({
        target,
        video: { codec: 'avc', width: w, height: h },
        audio: aConf ? { codec: 'aac', sampleRate: aConf.sampleRate, numberOfChannels: aConf.numberOfChannels } : undefined,
        fastStart: 'fragmented',
        firstTimestampBehavior: 'offset'
    });

    vEncoder = new VideoEncoder({ output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), error: e => el.status.innerText = '❌ 视频错误: ' + e.message });
    vEncoder.configure({ codec: selectedCodec, width: w, height: h, bitrate: bps, framerate: fps });

    if (aConf) {
        aEncoder = new AudioEncoder({ output: (chunk, meta) => muxer.addAudioChunk(chunk, meta), error: e => el.status.innerText = '❌ 音频错误: ' + e.message });
        aEncoder.configure(aConf);
        const aReader = new MediaStreamTrackProcessor(aTrack).readable.getReader();
        (async () => {
            while (isRecording) {
                const { done, value } = await aReader.read();
                if (done) break;
                if (aEncoder.state === 'configured') aEncoder.encode(value);
                value.close();
            }
        })();
    }

    const vReader = new MediaStreamTrackProcessor(vTrack).readable.getReader();
    el.status.innerText = `🚀 GPU 录制中 (${mbps}Mbps)`;
    while (isRecording) {
        const { done, value } = await vReader.read();
        if (done) break;
        if (vEncoder.state === 'configured') vEncoder.encode(value);
        value.close();
    }
}

async function startCPURec(stream, mbps) {
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=h264' });
    const chunks = [];
    recorder.ondataavailable = e => {
        if (writableFileStream) writableFileStream.write(e.data);
        else chunks.push(e.data);
    };
    recorder.onstop = async () => {
        if (writableFileStream) {
            await writableFileStream.close();
            el.status.innerText = '✅ 录制完成';
        } else {
            el.status.innerText = '⏳ 优化容器中...';
            const blob = new Blob(chunks, { type: 'video/webm' });
            ffmpeg.FS('writeFile', 'in.webm', await fetchFile(blob));
            await ffmpeg.run('-i', 'in.webm', '-c:v', 'copy', '-b:v', mbps + 'M', '-movflags', 'frag_keyframe+empty_moov', 'out.mp4');
            saveFile(ffmpeg.FS('readFile', 'out.mp4'));
        }
    };
    window._cpuRec = recorder;
    recorder.start(1000);
    el.status.innerText = `🐌 CPU 录制中 (${mbps}Mbps)`;
}

el.btnStop.onclick = async () => {
    isRecording = false;
    clearInterval(timerId);
    el.recUI.style.display = 'none';
    el.btnStart.disabled = false;
    el.btnStop.disabled = true;

    if (vEncoder) {
        if (vEncoder.state === 'configured') await vEncoder.flush();
        vEncoder.close();
        if (aEncoder && aEncoder.state === 'configured') { await aEncoder.flush(); aEncoder.close(); }
        muxer.finalize();
        if (writableFileStream) {
            await writableFileStream.close();
            el.status.innerText = '✅ 录制已保存到硬盘';
        } else {
            saveFile(new Uint8Array(muxer.target.buffer));
        }
        vEncoder = aEncoder = null;
    } else if (window._cpuRec) {
        window._cpuRec.stop();
    }

    stopAllStreams();
};

function stopAllStreams() {
    if (sourceStream) sourceStream.getTracks().forEach(t => t.stop());
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (sysAudioStream) sysAudioStream.getTracks().forEach(t => t.stop());
    sourceStream = micStream = sysAudioStream = null;
}

function saveFile(data) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
    a.download = `Record_${Date.now()}.mp4`;
    a.click();
}
</script>
</body>
</html>
