<!DOCTYPE html>
<html lang="zh-CN">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">

<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 600px; border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: #1e293b; font-size: 1.25rem; margin-bottom: 20px; }
        .setting-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .setting-item { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; color: #64748b; }
        select, input[type="range"] { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; }
        .bitrate-info { display: flex; justify-content: space-between; align-items: center; }
        #log { background: #0f172a; color: #38bdf8; padding: 12px; height: 160px; overflow-y: auto; font-family: 'ui-monospace', monospace; font-size: 11px; border-radius: 6px; margin-top: 20px; white-space: pre-wrap; border: 1px solid #1e293b; }
        .btn-run { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-run:hover { background: #0284c7; }
        .btn-run:disabled { background: #94a3b8; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    
    <div style="margin-bottom: 20px;">
        <input type="file" id="fileInput" accept="video/*,audio/*">
    </div>

    <div class="setting-group">
        <div class="setting-item">
            <label>目标格式</label>
            <select id="formatSelect">
                <option value="mp3">MP3</option>
                <option value="aac">AAC (.m4a)</option>
                <option value="wav">WAV (无损)</option>
            </select>
        </div>
        <div class="setting-item">
            <label>采样率</label>
            <select id="sampleRateSelect">
                <option value="44100">44100 Hz</option>
                <option value="48000">48000 Hz</option>
                <option value="16000">16000 Hz (语音)</option>
            </select>
        </div>
        <div class="setting-item">
            <label>声道</label>
            <select id="channelSelect">
                <option value="2">立体声 (2.0)</option>
                <option value="1">单声道 (1.0)</option>
            </select>
        </div>
        <div class="setting-item" id="bitrateBox">
            <div class="bitrate-info">
                <label>码率</label>
                <span id="bitrateVal" style="font-size: 12px; color: #0ea5e9;">128 kbps</span>
            </div>
            <input type="range" id="bitrateRange" min="64" max="192" step="32" value="128">
        </div>
    </div>

    <button id="startBtn" class="btn-run" disabled>加载中...</button>
</div>

<script>
    const ffmpegHost = window.parent;
    if (!ffmpegHost || ffmpegHost === window || !ffmpegHost.SharedFFmpeg || !ffmpegHost.FFmpeg) {
        document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif">请从 index.html 打开此页面。</div>';
        throw new Error('请从 index.html 进入此页面');
    }
    const ffmpeg = ffmpegHost.SharedFFmpeg.getOrCreate(ffmpegHost.__sharedFFmpegConfig);

    const el = {
        log: document.getElementById('log'),
        startBtn: document.getElementById('startBtn'),
        format: document.getElementById('formatSelect'),
        bitrateBox: document.getElementById('bitrateBox'),
        bitrateRange: document.getElementById('bitrateRange'),
        bitrateVal: document.getElementById('bitrateVal'),
        sampleRate: document.getElementById('sampleRateSelect'),
        channels: document.getElementById('channelSelect'),
        fileInput: document.getElementById('fileInput')
    };

    function addLog(msg) {
        el.log.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        el.log.scrollTop = el.log.scrollHeight;
    }

    // 初始化
    (async () => {
        try {
            await ffmpegHost.SharedFFmpeg.load(ffmpegHost.__sharedFFmpegConfig);
            el.startBtn.innerText = "开始提取音频";
            el.startBtn.disabled = false;
            console.log('[audio]', '请选择文件并设置参数。');
        } catch (e) {
            console.error('[audio]', '无法加载 Wasm 核心', e);
        }
    })();

    // UI 交互
    el.format.onchange = () => {
        el.bitrateBox.style.visibility = el.format.value === 'wav' ? 'hidden' : 'visible';
    };
    el.bitrateRange.oninput = () => {
        el.bitrateVal.innerText = el.bitrateRange.value + " kbps";
    };

    // 核心转换逻辑
    el.startBtn.onclick = async () => {
        const file = el.fileInput.files[0];
        if (!file) return alert("请选择文件");

        el.startBtn.disabled = true;
        addLog(`正在处理: ${file.name}`);

        const inputData = new Uint8Array(await file.arrayBuffer());
        const format = el.format.value;
        
        // --- 保持原文件名的逻辑 ---
        // 使用正则去掉最后一个点及其后面的后缀
        const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        const outExt = format === 'aac' ? 'm4a' : format;
        const outputFileName = `${baseName}.${outExt}`;
        // -----------------------

        const inputTmp = "in_file";
        const outputTmp = `out_file.${outExt}`;

        const args = ['-i', inputTmp, '-vn', '-ar', el.sampleRate.value, '-ac', el.channels.value];

        if (format === 'wav') {
            args.push('-f', 'wav');
        } else {
            args.push('-b:a', `${el.bitrateRange.value}k`);
            args.push('-acodec', format === 'mp3' ? 'libmp3lame' : 'aac');
        }
        args.push(outputTmp);

        try {
            ffmpeg.FS('writeFile', inputTmp, inputData);
            addLog(" 开始提取音频...");
            
            await ffmpeg.run(...args);

            const outData = ffmpeg.FS('readFile', outputTmp);
            const blobType = format === 'wav' ? 'audio/wav' : (format === 'mp3' ? 'audio/mpeg' : 'audio/mp4');
            const url = URL.createObjectURL(new Blob([outData.buffer], { type: blobType }));

            const a = document.createElement('a');
            a.href = url;
            a.download = outputFileName; // 这里应用了保持原名后的新文件名
            a.click();

            addLog(`成功！已保存为: ${outputFileName}`);
            
            // 清理 VFS 内存
            ffmpeg.FS('unlink', inputTmp);
            ffmpeg.FS('unlink', outputTmp);
        } catch (err) {
            addLog(`失败: ${err.message}`);
        } finally {
            el.startBtn.disabled = false;
        }
    };
</script>
</body>
</html>
