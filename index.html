<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线音视频工具箱</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
  <script src="./lib/ffmpeg.min.js"></script>
  <script src="./shared-ffmpeg.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 20px 40px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }
    .topbar {
      padding: 18px 22px 12px;
      border-bottom: 1px solid rgba(148,163,184,.18);
      background: rgba(15,23,42,.88);
      backdrop-filter: blur(10px);
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }
    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .engine-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(30,41,59,.88);
      border: 1px solid rgba(148,163,184,.18);
      font-size: 13px;
      box-shadow: var(--shadow);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245,158,11,.16);
    }
    .dot.ready {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(16,185,129,.16);
    }
    .dot.error {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(239,68,68,.16);
    }
    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px 22px 14px;
      background: rgba(2,6,23,.5);
      border-bottom: 1px solid rgba(148,163,184,.12);
    }
    .tab-btn {
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(30,41,59,.9);
      color: #cbd5e1;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: .2s ease;
    }
    .tab-btn:hover { background: rgba(51,65,85,.95); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 25px rgba(37,99,235,.3);
    }
    .main {
      min-height: 0;
      padding: 16px;
    }
    .frame-wrap {
      height: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(148,163,184,.12);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .title-wrap h1 { font-size: 18px; }
      .topbar, .tabs, .main { padding-left: 12px; padding-right: 12px; }
      .main { padding-top: 12px; padding-bottom: 12px; }
      .frame-wrap { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-row">
        <div class="title-wrap">
          <h1>在线音视频工具箱</h1>
          <p>by TamXie</p>
        </div>
        <div class="engine-status">
          <span id="engineDot" class="dot"></span>
          <span id="engineText">正在初始化 wasm 引擎...</span>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="main">
      <div class="frame-wrap">
        <iframe id="toolFrame" title="工具页面"></iframe>
      </div>
    </div>
  </div>

  <script>
    const tools = [
      { key: 'convert', label: '在线视频裁剪压缩', page: './convert.html' },
      { key: 'merge', label: '视频合并与截取', page: './merge.html' },
      { key: 'mixav', label: '音视频合并/替换', page: './mixav.html' },
      { key: 'audio', label: '提取音频', page: './audio.html' },
      { key: 'screen', label: '屏幕录制', page: './screen.html' },
      { key: 'camera', label: '摄像头录制', page: './camera.html' },
      { key: 'rep', label: '文件修复', page: './rep.html' },
      { key: 'webrtc', label: 'Webrtc', page: './webrtc.html' }
    ];

    const tabsEl = document.getElementById('tabs');
    const frameEl = document.getElementById('toolFrame');
    const engineDot = document.getElementById('engineDot');
    const engineText = document.getElementById('engineText');

    const ffmpegConfig = {
      corePath: new URL('./lib/ffmpeg-core.js', document.location).href,
      log: false,
    };

    window.__sharedFFmpegConfig = ffmpegConfig;

    async function initSharedEngine() {
      try {
        engineText.textContent = '页面正在加载...';
        await window.SharedFFmpeg.load(ffmpegConfig);
        engineDot.classList.remove('error');
        engineDot.classList.add('ready');
        engineText.textContent = '页面已就绪';
      } catch (err) {
        engineDot.classList.remove('ready');
        engineDot.classList.add('error');
        engineText.textContent = 'Wasm 初始化失败：' + (err?.message || err);
        console.error(err);
      }
    }

    function setActiveTab(key) {
      const item = tools.find(t => t.key === key) || tools[0];
      history.replaceState(null, '', '#'+item.key);
      Array.from(tabsEl.querySelectorAll('.tab-btn')).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === item.key);
      });
      if (frameEl.getAttribute('src') !== item.page) {
        frameEl.src = item.page;
      }
    }

    function renderTabs() {
      tabsEl.innerHTML = tools.map(item =>
        `<button class="tab-btn" data-key="${item.key}" type="button">${item.label}</button>`
      ).join('');
      tabsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        setActiveTab(btn.dataset.key);
      });
    }

    window.addEventListener('hashchange', () => {
      const key = location.hash.replace(/^#/, '') || tools[0].key;
      setActiveTab(key);
    });

    renderTabs();
    setActiveTab(location.hash.replace(/^#/, '') || tools[0].key);
    initSharedEngine();
  </script>
</body>
</html>
