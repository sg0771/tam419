<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线音视频工具箱</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
  <script src="./lib/ffmpeg.min.js"></script>
  <script src="./shared-ffmpeg.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --shadow: 0 20px 40px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 5px 5px 5px;
      background: rgba(2,6,23,.5);
      border-bottom: 1px solid rgba(148,163,184,.12);
    }
    .tab-btn {
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(30,41,59,.9);
      color: #cbd5e1;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: .2s ease;
    }
    .tab-btn:hover { background: rgba(51,65,85,.95); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 25px rgba(37,99,235,.3);
    }
    .main {
      min-height: 0;
      padding: 16px;
    }
    .frame-wrap {
      height: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(148,163,184,.12);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .tabs, .main { padding-left: 12px; padding-right: 12px; }
      .main { padding-top: 12px; padding-bottom: 12px; }
      .frame-wrap { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="tabs" id="tabs"></div>

    <div class="main">
      <div class="frame-wrap">
        <iframe id="toolFrame" title="工具页面"></iframe>
      </div>
    </div>
  </div>

  <script>
    const tools = [
      { key: 'convert', label: '视频裁剪压缩', page: './convert.html' },
      { key: 'merge',   label: '视频合并截取', page: './merge.html' },
      { key: 'mixav',   label: '音视频合并替换修复', page: './mixav.html' },
      { key: 'record',  label: '录制屏幕/摄像头', page: './record.html' },
      { key: 'webrtc',  label: 'Webrtc测试', page: './webrtc.html' }
    ];

    const tabsEl = document.getElementById('tabs');
    const frameEl = document.getElementById('toolFrame');

    const ffmpegConfig = {
      corePath: new URL('./lib/ffmpeg-core.js', document.location).href,
      log: false,
    };

    window.__sharedFFmpegConfig = ffmpegConfig;

    async function initSharedEngine() {
      try {
        await window.SharedFFmpeg.load(ffmpegConfig);
      } catch (err) {
        console.error('Wasm 初始化失败：', err);
      }
    }

    function setActiveTab(key) {
      const item = tools.find(t => t.key === key) || tools[0];
      history.replaceState(null, '', '#'+item.key);

      Array.from(tabsEl.querySelectorAll('.tab-btn')).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === item.key);
      });

      if (frameEl.getAttribute('src') !== item.page) {
        frameEl.src = item.page;
      }
    }

    function renderTabs() {
      tabsEl.innerHTML = tools.map(item =>
        `<button class="tab-btn" data-key="${item.key}" type="button">${item.label}</button>`
      ).join('');

      tabsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        setActiveTab(btn.dataset.key);
      });
    }

    window.addEventListener('hashchange', () => {
      const key = location.hash.replace(/^#/, '') || tools[0].key;
      setActiveTab(key);
    });

    renderTabs();
    setActiveTab(location.hash.replace(/^#/, '') || tools[0].key);
    initSharedEngine();
  </script>
</body>
</html>
