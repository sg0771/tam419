<!DOCTYPE html>
<html lang="zh-CN">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 800px; }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; }
        
        .file-list-container { margin: 20px 0; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; background: #fafafa; }
        .file-item { border-bottom: 1px solid #eee; background: #fff; padding: 15px; }
        .file-main { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .file-name { font-weight: 600; color: #333; flex: 1; }
        
        /* 预览区域样式 */
        .preview-box { margin-top: 10px; display: none; background: #000; border-radius: 8px; padding: 10px; text-align: center; }
        video { max-width: 100%; border-radius: 4px; height: 240px; }
        
        .time-controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .time-btn { padding: 5px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-start { background: #e7f3ff; color: #1a73e8; }
        .btn-end { background: #fff1f0; color: #ff4d4f; }
        .time-display { font-size: 12px; color: #666; margin-top: 5px; }

        .config-panel { background: #f8f9fa; border: 1px solid #e8e8e8; border-radius: 12px; margin: 20px 0; padding: 15px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; }
        .field-group label { font-size: 12px; display: block; margin-bottom: 5px; color: #666; }
        .field-group input { width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 6px; box-sizing: border-box; }

        button#startBtn { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button#startBtn:disabled { background: #ccc; }
        
        #status { margin-top: 20px; font-size: 13px; color: #666; text-align: center; min-height: 40px; line-height: 1.5; }
        .prog-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        #prog-fill { width: 0%; height: 100%; background: #34a853; transition: width 0.3s; }
        .gpu-badge { background: #ff9800; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; vertical-align: top; }
    </style>
</head>
<body>

<div class="card">
    
    <div class="field-group">
        <label>添加视频文件 (点击项目可预览及截取时间)</label>
        <input type="file" id="fileIn" accept="video/*" multiple disabled>
    </div>

    <div class="file-list-container" id="fileListView">
        <div style="padding: 20px; text-align: center; color: #999;">载入中...</div>
    </div>

    <div class="config-panel">
        <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="useCopy"> 
            <label for="useCopy" style="font-weight:bold; cursor:pointer; color:#28a745;">使用无损极速拼接 (忽略截取和尺寸设置)</label>
        </div>
        <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="useGPU" checked> 
            <label for="useGPU" style="font-weight:bold; cursor:pointer; color:#ff9500;">启用 GPU 硬件加速<span class="gpu-badge">推荐</span></label>
        </div>
        <div class="grid-4" id="transcodeSettings">
            <div class="field-group"><label>目标宽度 (对齐偶数)</label><input type="number" id="targetW" value="1280"></div>
            <div class="field-group"><label>目标高度 (对齐偶数)</label><input type="number" id="targetH" value="720"></div>
            <div class="field-group"><label>输出帧率</label><input type="number" id="targetFPS" value="25"></div>
            <div class="field-group"><label>码率 (Mbps)</label><input type="number" id="targetBitrate" value="2.5" step="0.1"></div>
        </div>
    </div>

    <button id="startBtn" disabled>开始合并任务</button>
    <div class="prog-bg" id="progBox"><div id="prog-fill"></div></div>
    <div id="status">初始化中...</div>
    
    <video id="h-video" muted playsinline style="display:none"></video>
    <canvas id="h-canvas" style="display:none"></canvas>
</div>

<script type="module">
    import { Muxer, ArrayBufferTarget } from './lib/mp4-muxer.js';
    const ffmpegHost = window.parent;
    if (!ffmpegHost || ffmpegHost === window || !ffmpegHost.SharedFFmpeg || !ffmpegHost.FFmpeg) {
        document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif">请从 index.html 打开此页面。</div>';
        throw new Error('请从 index.html 进入此页面');
    }
    const { fetchFile } = ffmpegHost.FFmpeg;
    const ffmpeg = ffmpegHost.SharedFFmpeg.getOrCreate(ffmpegHost.__sharedFFmpegConfig);
    
    const [fileIn, startBtn, status, progFill, progBox, targetWIn, targetHIn, targetFPSIn, targetBitrateIn, fileListView, useCopyCheck, useGPUCheck, hVideo, hCanvas] = 
        ['fileIn', 'startBtn', 'status', 'prog-fill', 'progBox', 'targetW', 'targetH', 'targetFPS', 'targetBitrate', 'fileListView', 'useCopy', 'useGPU', 'h-video', 'h-canvas'].map(id => document.getElementById(id));

    let videoQueue = []; 

    // 监听互斥：极速模式和 GPU 模式排他
    useCopyCheck.onchange = () => { if (useCopyCheck.checked) useGPUCheck.checked = false; };
    useGPUCheck.onchange = () => { if (useGPUCheck.checked) useCopyCheck.checked = false; };

    (async () => {
        if (!self.crossOriginIsolated) {
            status.innerHTML = "<b style='color:#d93025'>环境错误：未检测到跨域隔离，无法使用多线程和高级引擎。</b>";
            return;
        }
        try {
            await ffmpegHost.SharedFFmpeg.load(ffmpegHost.__sharedFFmpegConfig);
            fileIn.disabled = false;
            status.innerText = "wasm 就绪，请添加文件";
            renderList();
        } catch (e) { status.innerText = "加载失败。"; }
    })();

    fileIn.onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            videoQueue.push({
                file,
                url: URL.createObjectURL(file),
                start: 0,
                end: null,
                duration: 0,
                id: Math.random().toString(36).substr(2, 9)
            });
        });
        renderList();
        fileIn.value = ''; // 清空选择框允许重复选同一个
    };

    function renderList() {
        if (videoQueue.length === 0) {
            fileListView.innerHTML = `<div style="padding: 20px; text-align: center; color: #999;">列表为空</div>`;
            startBtn.disabled = true;
            return;
        }
        fileListView.innerHTML = videoQueue.map((item, index) => `
            <div class="file-item">
                <div class="file-main" onclick="togglePreview('${item.id}')">
                    <span class="file-name">${index + 1}. ${item.file.name}</span>
                    <button class="del-btn" onclick="event.stopPropagation(); removeVideo('${item.id}')" style="background:#ff4d4f; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">删除</button>
                </div>
                <div class="preview-box" id="pre-${item.id}">
                    <video id="vid-${item.id}" src="${item.url}" controls onloadedmetadata="updateDuration('${item.id}', this)"></video>
                    <div class="time-controls">
                        <button class="time-btn btn-start" onclick="setTime('${item.id}', 'start')">设为起点</button>
                        <button class="time-btn btn-end" onclick="setTime('${item.id}', 'end')">设为终点</button>
                    </div>
                    <div class="time-display" id="info-${item.id}">
                        当前范围: ${item.start.toFixed(2)}s - ${item.end ? item.end.toFixed(2) + 's' : '结尾'}
                    </div>
                </div>
            </div>
        `).join('');
        startBtn.disabled = videoQueue.length < 2;
    }

    window.togglePreview = (id) => {
        const box = document.getElementById(`pre-${id}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };

    window.updateDuration = (id, el) => {
        const item = videoQueue.find(v => v.id === id);
        if (item) item.duration = el.duration;
    };

    window.setTime = (id, type) => {
        const video = document.getElementById(`vid-${id}`);
        const item = videoQueue.find(v => v.id === id);
        if (type === 'start') item.start = video.currentTime;
        else item.end = video.currentTime;
        document.getElementById(`info-${id}`).innerText = `当前范围: ${item.start.toFixed(2)}s - ${item.end ? item.end.toFixed(2) + 's' : '结尾'}`;
    };

    window.removeVideo = (id) => {
        videoQueue = videoQueue.filter(v => v.id !== id);
        renderList();
    };

    startBtn.onclick = async () => {
        const isCopyMode = useCopyCheck.checked;
        const isGPUMode = useGPUCheck.checked;
        startBtn.disabled = true;
        progBox.style.display = 'block';
        const tsFiles = [];

        // 规范化输出参数
        const TW = Math.floor(parseInt(targetWIn.value) / 2) * 2;
        const TH = Math.floor(parseInt(targetHIn.value) / 2) * 2;
        const TFPS = parseFloat(targetFPSIn.value);
        const TBitrate = parseFloat(targetBitrateIn.value) * 1_000_000; // 转换为 bps

        try {
            // GPU 编码器配置预判
            let gpuConfig = null;
            if (isGPUMode) {
                const codecConfigs = [
                    { codec: 'avc1.640033', hardwareAcceleration: 'prefer-hardware' }, 
                    { codec: 'avc1.4D4033', hardwareAcceleration: 'prefer-hardware' }, 
                    { codec: 'avc1.42E033', hardwareAcceleration: 'prefer-hardware' }, 
                    { codec: 'avc1.4D4028', hardwareAcceleration: 'prefer-software' }
                ];
                for (const base of codecConfigs) {
                    const testConfig = { ...base, width: TW, height: TH, bitrate: TBitrate, framerate: TFPS, bitrateMode: 'constant' };
                    if ((await VideoEncoder.isConfigSupported(testConfig)).supported) {
                        gpuConfig = testConfig; break;
                    }
                }
                if (!gpuConfig) throw new Error("该分辨率超出设备硬件支持范围，请降低分辨率或关闭GPU加速。");
            }

            // 循环处理每个分段
            for (let i = 0; i < videoQueue.length; i++) {
                const item = videoQueue[i];
                const inName = `input_${i}`;
                const outTs = `seg_${i}.ts`;
                
                status.innerText = `处理分段 (${i+1}/${videoQueue.length}): ${item.file.name}`;
                ffmpeg.FS('writeFile', inName, await fetchFile(item.file));

                if (isCopyMode) {
                    // 1. 无损极速拼接模式
                    await ffmpeg.run('-y', '-i', inName, '-c', 'copy', '-f', 'mpegts', outTs);
                } 
                else if (isGPUMode) {
                    // 2. GPU 硬件转码模式
                    // 2.1 提取并截取音频
                    await ffmpeg.run('-y', '-ss', item.start.toString(), '-to', (item.end || item.duration).toString(), '-i', inName, '-vn', '-c:a', 'aac', '-b:a', '128k', 'temp_a.m4a');

                    // 2.2 准备 Canvas 绘制画面 (等比例缩放居中)
                    hVideo.src = item.url;
                    await new Promise(r => hVideo.onloadedmetadata = r);
                    hCanvas.width = TW; hCanvas.height = TH;
                    const ctx = hCanvas.getContext('2d', { alpha: false });

                    const muxer = new Muxer({ 
                        target: new ArrayBufferTarget(), 
                        video: { codec: 'avc', width: TW, height: TH },
                        fastStart: 'in-memory'
                    });

                    const encoder = new VideoEncoder({ 
                        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), 
                        error: e => { throw new Error("VideoEncoder Error: " + e.message); } 
                    });
                    encoder.configure(gpuConfig);

                    const clipDuration = (item.end || hVideo.duration) - item.start;
                    const totalFrames = Math.floor(clipDuration * TFPS);

                    for (let f = 0; f < totalFrames; f++) {
                        hVideo.currentTime = item.start + (f / TFPS);
                        await new Promise(r => { const fn = () => { hVideo.removeEventListener('seeked', fn); r(); }; hVideo.addEventListener('seeked', fn); });
                        
                        // 画面等比填充，多余部分黑边补齐
                        ctx.fillStyle = "black";
                        ctx.fillRect(0, 0, TW, TH);
                        const scale = Math.min(TW / hVideo.videoWidth, TH / hVideo.videoHeight);
                        const drawW = hVideo.videoWidth * scale;
                        const drawH = hVideo.videoHeight * scale;
                        ctx.drawImage(hVideo, (TW - drawW) / 2, (TH - drawH) / 2, drawW, drawH);

                        const frame = new VideoFrame(hCanvas, { timestamp: (f * 1_000_000 / TFPS) });
                        encoder.encode(frame, { keyFrame: f % 60 === 0 });
                        frame.close();

                        if (f % 10 === 0) {
                            const globalRatio = (i + (f / totalFrames)) / videoQueue.length;
                            progFill.style.width = Math.floor(globalRatio * 100) + '%';
                            status.innerText = `GPU 渲染中 (${i+1}/${videoQueue.length}): 进度 ${Math.floor((f / totalFrames) * 100)}%`;
                        }
                    }
                    await encoder.flush();
                    muxer.finalize();

                    // 2.3 将 GPU MP4 与 音频合并，并转换为 MPEGTS
                    ffmpeg.FS('writeFile', 'temp_v.mp4', new Uint8Array(muxer.target.buffer));
                    // 加上 -bsf:v h264_mp4toannexb 将 mp4 容器里的 H.264 转换为 TS 拼接需要的 Annex B 格式
                    await ffmpeg.run('-y', '-i', 'temp_v.mp4', '-i', 'temp_a.m4a', '-c', 'copy', '-bsf:v', 'h264_mp4toannexb', '-f', 'mpegts', outTs);
                    
                    // 清理中间临时文件
                    ffmpeg.FS('unlink', 'temp_v.mp4');
                    ffmpeg.FS('unlink', 'temp_a.m4a');
                } 
                else {
                    // 3. 原生 CPU WASM 转码模式
                    ffmpeg.setProgress(({ ratio }) => { 
                        progFill.style.width = Math.floor(((i + ratio) / videoQueue.length) * 100) + '%'; 
                    });
                    const args = ['-y', '-ss', item.start.toString()];
                    if (item.end) args.push('-to', item.end.toString());
                    args.push('-i', inName);
                    args.push('-vf', `scale=${TW}:${TH}:force_original_aspect_ratio=decrease,pad=${TW}:${TH}:(ow-iw)/2:(oh-ih)/2,setpts=PTS-STARTPTS`);
                    // 加入码率控制参数 -b:v
                    args.push('-c:v', 'libx264', '-preset', 'veryfast', '-threads', '4', '-r', TFPS.toString(), '-b:v', targetBitrateIn.value + 'M');
                    args.push('-c:a', 'aac', '-f', 'mpegts', outTs);
                    await ffmpeg.run(...args);
                }

                tsFiles.push(outTs);
                ffmpeg.FS('unlink', inName); // 清理当前原始文件以节省内存
            }

            // 最终合并所有的 .ts 文件
            status.innerText = "片段转码完毕，正在执行最终合并封装...";
            await ffmpeg.run('-y', '-i', `concat:${tsFiles.join('|')}`, '-c', 'copy', '-movflags', '+faststart', 'out.mp4');

            const data = ffmpeg.FS('readFile', 'out.mp4');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            a.download = `Merged_Pro_${Date.now()}.mp4`;
            a.click();
            status.innerText = "🎉 任务圆满完成！文件已开始下载。";
            progFill.style.width = '100%';

        } catch (err) {
            status.innerHTML = `<span style="color:#d93025;font-weight:bold;">运行出错: ${err.message}</span>`;
            console.error(err);
        } finally {
            startBtn.disabled = false;
        }
    };
</script>
</body>
</html>
