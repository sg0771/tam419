<!DOCTYPE html>
<html lang="zh-CN">
<link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">

<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #007aff; --danger: #d93025; --success: #28a745; --bg: #f5f7f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 950px; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; margin-bottom: 20px; }
        
        .preview-wrap { background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 20px; aspect-ratio: 16/9; border: 2px solid #ddd; }
        video#preview { width: 100%; height: 100%; object-fit: contain; }
        
        /* 录制状态显示 */
        .rec-status { position: absolute; top: 15px; left: 15px; display: none; align-items: center; gap: 8px; z-index: 10; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; }
        .dot { width: 10px; height: 10px; background: #ff4d4f; border-radius: 50%; animation: blink 1s infinite; }
        .timer { color: #fff; font-family: monospace; font-size: 15px; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 4列配置网格 */
        .config-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }

        .actions { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; color: white; transition: all 0.2s; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        #btn-preview { background: #6c757d; }
        #btn-start { background: var(--danger); }
        #btn-stop { background: var(--success); }

        .caps-info { font-size: 11px; color: #0050b3; margin-top: 4px; }
        #status-msg { text-align: center; margin-top: 10px; font-size: 13px; color: #888; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="card">
    <div class="preview-wrap">
        <div class="rec-status" id="rec-ui">
            <div class="dot"></div>
            <span class="timer" id="rec-timer">00:00:00</span>
        </div>
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <div class="config-grid">
        <div class="field">
            <label>1. 摄像头设备</label>
            <select id="cam-dev"><option value="">正在检测设备...</option></select>
        </div>
        <div class="field">
            <label>2. 采集参数 (自动匹配)</label>
            <select id="cam-res">
                <option value="default">请先开启预览</option>
            </select>
            <div id="caps-hint" class="caps-info">同步硬件能力中...</div>
        </div>
        <div class="field">
            <label>3. 视频码率 (Mbps)</label>
            <input type="number" id="v-bitrate" value="5.0" step="0.5" min="0.5">
        </div>
        <div class="field">
            <label>4. 声音来源</label>
            <select id="audio-mode">
                <option value="mix" selected>混音 (麦+系统音)</option>
                <option value="mic">仅麦克风</option>
                <option value="sys">仅系统声音</option>
                <option value="none">无声</option>
            </select>
        </div>
        <div class="field">
            <label>5. 编码引擎</label>
            <select id="encode-engine">
                <option value="gpu">GPU 硬件加速</option>
                <option value="cpu">CPU 软件转码</option>
            </select>
        </div>
        <div class="field">
            <label>6. 存储方式</label>
            <select id="write-mode">
                <option value="disk">直接写硬盘 (防崩溃)</option>
                <option value="ram">缓存到内存</option>
            </select>
        </div>
        <div class="field">
            <label>7. 输出格式</label>
            <select id="output-fmt"><option value="mp4">fMP4 (异常保护)</option></select>
        </div>
    </div>

    <div class="actions">
        <button id="btn-preview" class="btn">开启预览并同步硬件</button>
        <button id="btn-start" class="btn" disabled>开始录制</button>
        <button id="btn-stop" class="btn" disabled>停止录制并保存</button>
    </div>
</div>

<script type="module">
    import { Muxer, ArrayBufferTarget, StreamTarget } from './lib/mp4-muxer.js';
    const ffmpegHost = window.parent;
    if (!ffmpegHost || ffmpegHost === window || !ffmpegHost.SharedFFmpeg || !ffmpegHost.FFmpeg) {
        document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif">请从 index.html 打开此页面。</div>';
        throw new Error('请从 index.html 进入此页面');
    }
    const { fetchFile } = ffmpegHost.FFmpeg;
    const ffmpeg = ffmpegHost.SharedFFmpeg.getOrCreate(ffmpegHost.__sharedFFmpegConfig);
    const el = {
        preview: document.getElementById('preview'),
        status: document.getElementById('status-msg'),
        camSelect: document.getElementById('cam-dev'),
        resSelect: document.getElementById('cam-res'),
        hint: document.getElementById('caps-hint'),
        bitrateInput: document.getElementById('v-bitrate'),
        btnPreview: document.getElementById('btn-preview'),
        btnStart: document.getElementById('btn-start'),
        btnStop: document.getElementById('btn-stop'),
        recUI: document.getElementById('rec-ui'),
        recTimer: document.getElementById('rec-timer')
    };

    let mainStream = null;
    let isRecording = false;
    let recStartTime = 0;
    let timerId = null;
    let vEncoder = null, aEncoder = null, muxer = null;
    let writableFileStream = null;

    // --- 初始化设备 ---
    (async () => {
        try {
            await ffmpegHost.SharedFFmpeg.load(ffmpegHost.__sharedFFmpegConfig);
            const devices = await navigator.mediaDevices.enumerateDevices();
            el.camSelect.innerHTML = devices.filter(d => d.kind === 'videoinput')
                .map(c => `<option value="${c.deviceId}">${c.label || '摄像头'}</option>`).join('');
        } catch (e) { el.status.innerText = "❌ 引擎初始化失败"; }
    })();

    // --- 智能硬件探测 ---
    async function probeCapabilities(track) {
        if (!track.getCapabilities) {
            el.resSelect.innerHTML = `<option value="1280x720|30">720P / 30FPS (默认)</option>`;
            return;
        }
        const caps = track.getCapabilities();
        const maxW = caps.width.max, maxH = caps.height.max, maxFPS = caps.frameRate.max;
        const presets = [
            { w: 3840, h: 2160, label: "4K" },
            { w: 1920, h: 1080, label: "1080P" },
            { w: 1280, h: 720, label: "720P" },
            { w: 640, h: 360, label: "360P" }
        ];
        let html = "";
        presets.forEach(p => {
            if (maxW >= p.w && maxH >= p.h) {
                html += `<option value="${p.w}x${p.h}|30">${p.label} / 30FPS</option>`;
                if (maxFPS >= 60) html += `<option value="${p.w}x${p.h}|60">${p.label} / 60FPS</option>`;
            }
        });
        el.resSelect.innerHTML = html || `<option value="${maxW}x${maxH}|${Math.floor(maxFPS)}">${maxW}x${maxH} @ ${Math.floor(maxFPS)}FPS</option>`;
        el.hint.innerText = `✅ 硬件上限: ${maxW}x${maxH} @ ${Math.floor(maxFPS)}FPS`;
    }

    // --- 预览 ---
    el.btnPreview.onclick = async () => {
        if (mainStream) mainStream.getTracks().forEach(t => t.stop());
        try {
            mainStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: el.camSelect.value ? { exact: el.camSelect.value } : undefined },
                audio: true 
            });
            el.preview.srcObject = mainStream;
            await probeCapabilities(mainStream.getVideoTracks()[0]);
            el.btnStart.disabled = false;
            el.status.innerText = "🎬 预览已同步";
        } catch (err) { alert("开启预览失败: " + err.message); }
    };

    // --- 开始录制 ---
    el.btnStart.onclick = async () => {
        const audioMode = document.getElementById('audio-mode').value;
        const writeMode = document.getElementById('write-mode').value;
        const engine = document.getElementById('encode-engine').value;
        const [res, fpsStr] = el.resSelect.value.split('|');
        const [w, h] = res.split('x').map(Number);
        const fps = parseInt(fpsStr);
        const bitrateMbps = parseFloat(el.bitrateInput.value) || 5.0;

        // 应用硬件约束
        try { await mainStream.getVideoTracks()[0].applyConstraints({ width: w, height: h, frameRate: fps }); } catch(e){}

        if (writeMode === 'disk') {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: `Camera_${Date.now()}.mp4`,
                    types: [{ description: 'Video', accept: {'video/mp4': ['.mp4']} }]
                });
                writableFileStream = await handle.createWritable();
            } catch (e) { return; }
        }

        const finalStream = new MediaStream();
        finalStream.addTrack(mainStream.getVideoTracks()[0]);

        try {
            // 音频处理
            if (audioMode !== 'none') {
                let tracks = [];
                if (audioMode === 'mic' || audioMode === 'mix') tracks.push(mainStream.getAudioTracks()[0]);
                if (audioMode === 'sys' || audioMode === 'mix') {
                    const sys = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    if (sys.getAudioTracks().length > 0) {
                        tracks.push(sys.getAudioTracks()[0]);
                        sys.getVideoTracks().forEach(t => t.stop());
                    }
                }
                if (tracks.length > 1) {
                    const ctx = new AudioContext();
                    const dest = ctx.createMediaStreamDestination();
                    tracks.forEach(t => ctx.createMediaStreamSource(new MediaStream([t])).connect(dest));
                    finalStream.addTrack(dest.stream.getAudioTracks()[0]);
                } else if (tracks.length === 1) finalStream.addTrack(tracks[0]);
            }

            isRecording = true;
            el.btnStart.disabled = true; el.btnStop.disabled = false; el.recUI.style.display = 'flex';
            
            if (engine === 'gpu' && window.VideoEncoder) {
                await startGPURec(finalStream, w, h, fps, bitrateMbps);
            } else {
                await startCPURec(finalStream, bitrateMbps);
            }

            recStartTime = Date.now();
            timerId = setInterval(() => {
                const s = Math.floor((Date.now() - recStartTime) / 1000);
                el.recTimer.innerText = new Date(s * 1000).toISOString().substr(11, 8);
            }, 1000);

        } catch (err) { alert("启动失败: " + err.message); isRecording = false; el.btnStart.disabled = false; }
    };

    // --- GPU 核心 (含码率控制) ---
    async function startGPURec(stream, w, h, fps, mbps) {
        const bps = mbps * 1_000_000;
        const profiles = [{codec:'avc1.640033'}, {codec:'avc1.4D4033'}, {codec:'avc1.42E01F'}];
        let selectedCodec = 'avc1.42E01F';
        for (const p of profiles) {
            const support = await VideoEncoder.isConfigSupported({ codec: p.codec, width: w, height: h, bitrate: bps, framerate: fps });
            if (support.supported) { selectedCodec = p.codec; break; }
        }

        const aTrack = stream.getAudioTracks()[0];
        let aConf = null;
        if (aTrack) {
            const settings = aTrack.getSettings();
            aConf = { codec: 'mp4a.40.2', sampleRate: settings.sampleRate, numberOfChannels: settings.channelCount || 2, bitrate: 128_000 };
        }

        let target = writableFileStream ? 
            new StreamTarget({ onData: (data, pos) => writableFileStream.write({ type: 'write', data, position: pos }) }) : 
            new ArrayBufferTarget();

        muxer = new Muxer({
            target,
            video: { codec: 'avc', width: w, height: h },
            audio: aConf ? { codec: 'aac', sampleRate: aConf.sampleRate, numberOfChannels: aConf.numberOfChannels } : undefined,
            fastStart: 'fragmented',
            firstTimestampBehavior: 'offset'
        });

        vEncoder = new VideoEncoder({
            output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
            error: e => el.status.innerText = "❌ 视频错误: " + e.message
        });
        vEncoder.configure({ codec: selectedCodec, width: w, height: h, bitrate: bps, framerate: fps });

        if (aConf) {
            aEncoder = new AudioEncoder({
                output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
                error: e => el.status.innerText = "❌ 音频错误: " + e.message
            });
            aEncoder.configure(aConf);
            const aReader = new MediaStreamTrackProcessor(aTrack).readable.getReader();
            (async () => {
                while(isRecording) {
                    const {done, value} = await aReader.read();
                    if(done) break;
                    if(aEncoder.state === 'configured') aEncoder.encode(value);
                    value.close();
                }
            })();
        }

        const vReader = new MediaStreamTrackProcessor(stream.getVideoTracks()[0]).readable.getReader();
        el.status.innerText = `🚀 GPU 录制中 (${mbps}Mbps)`;
        while(isRecording) {
            const {done, value} = await vReader.read();
            if(done) break;
            if(vEncoder.state === 'configured') vEncoder.encode(value);
            value.close();
        }
    }

    // --- CPU 核心 (含码率设置) ---
    async function startCPURec(stream, mbps) {
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=h264' });
        const chunks = [];
        recorder.ondataavailable = e => {
            if (writableFileStream) writableFileStream.write(e.data);
            else chunks.push(e.data);
        };
        recorder.onstop = async () => {
            if (writableFileStream) { await writableFileStream.close(); el.status.innerText = "✅ 录制成功"; }
            else {
                el.status.innerText = "⏳ 优化容器与码率中...";
                const blob = new Blob(chunks, { type: 'video/webm' });
                ffmpeg.FS('writeFile', 'in.webm', await fetchFile(blob));
                await ffmpeg.run('-i', 'in.webm', '-c:v', 'copy', '-b:v', mbps + 'M', '-movflags', 'frag_keyframe+empty_moov', 'out.mp4');
                saveFile(ffmpeg.FS('readFile', 'out.mp4'));
            }
        };
        window._cpuRec = recorder; recorder.start(1000);
        el.status.innerText = `🐌 CPU 录制中 (${mbps}Mbps)`;
    }

    el.btnStop.onclick = async () => {
        isRecording = false; clearInterval(timerId);
        el.recUI.style.display = 'none'; el.btnStart.disabled = false; el.btnStop.disabled = true;
        
        if (vEncoder) {
            if (vEncoder.state === 'configured') await vEncoder.flush();
            vEncoder.close();
            if (aEncoder && aEncoder.state === 'configured') { await aEncoder.flush(); aEncoder.close(); }
            muxer.finalize();
            if (writableFileStream) { await writableFileStream.close(); el.status.innerText = "✅ 录制已入盘"; }
            else { saveFile(new Uint8Array(muxer.target.buffer)); }
            vEncoder = aEncoder = null;
        } else if (window._cpuRec) { window._cpuRec.stop(); }
    };

    function saveFile(data) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        a.download = `CamRecord_${Date.now()}.mp4`; a.click();
    }
</script>
</body>
</html>
